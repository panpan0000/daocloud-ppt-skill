name: Release OpenClaw Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Package skill
        run: make package-openclaw

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: corporate-ppt-generator-openclaw-official
          path: dist/corporate-ppt-generator-openclaw-official.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/corporate-ppt-generator-openclaw-official.zip
          generate_release_notes: true
